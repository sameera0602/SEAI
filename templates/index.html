<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Disease AI & LLM Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #020617;
            --bg-2: #0f172a;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.5);
            --primary-hover: #0ea5e9;
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: #38bdf8; top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -150px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #0ea5e9; top: 40%; left: 50%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-30px, 20px) scale(0.9); }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 90%;
            border: 1px solid var(--card-border);
            position: relative;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
            margin: 0;
            font-weight: 300;
        }

        .upload-area {
            border: 2px dashed rgba(56, 189, 248, 0.4);
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .upload-area:hover, .upload-area.dragover {
            background: rgba(56, 189, 248, 0.05);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            color: var(--primary);
            margin-bottom: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        .upload-area:hover .upload-icon {
            transform: scale(1.1) translateY(-5px);
        }

        .upload-area p {
            margin: 0;
            color: var(--text-main);
            font-weight: 500;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .upload-area span {
            display: block;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 10px;
            font-weight: 300;
        }

        input[type="file"] {
            display: none;
        }

        .image-preview {
            display: none;
            width: 100%;
            height: 250px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            border: none;
            padding: 16px 24px;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        button:hover:not(:disabled)::after {
            left: 100%;
            opacity: 1;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        button:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #loader {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        .modern-spinner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            background: conic-gradient(from 0deg, transparent 0%, var(--primary) 100%);
            animation: spin 1s linear infinite;
            position: relative;
        }

        .modern-spinner::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: var(--bg-2);
            border-radius: 50%;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        #result-section {
            display: none;
            margin-top: 40px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .prediction-header h3 {
            margin: 0;
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .prediction-badge {
            background: var(--danger-bg);
            color: #f87171;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        .advice-title {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .advice-title svg {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            color: var(--primary);
            filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        .advice-box {
            font-size: 15px;
            line-height: 1.7;
            color: #cbd5e1;
            font-weight: 300;
        }
        
        .advice-box p { margin-top: 0; margin-bottom: 1.2em; }
        .advice-box p:last-child { margin-bottom: 0; }

        @media (max-width: 600px) {
            .container { padding: 40px 25px; border-radius: 20px; }
            .header h1 { font-size: 28px; }
            .orb { display: none; } /* Better performance on mobile */
        }
    </style>
</head>
<body>

<!-- Animated Background -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
    <div class="header">
        <h1>Skin Disease AI</h1>
        <p>Next-generation diagnosis powered by deep learning</p>
    </div>

    <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p id="file-name">Drag & drop your scan here</p>
        <span>or click to browse from your device</span>
    </div>
    <input type="file" id="file-input" accept="image/*">
    
    <img id="image-preview" class="image-preview" src="#" alt="Image Preview">

    <button id="analyze-btn" onclick="analyzeImage()" disabled>Initiate AI Analysis</button>

    <div id="loader">
        <div class="modern-spinner"></div>
        <p style="color: var(--primary); font-size: 15px; font-weight: 500; letter-spacing: 0.5px;">Synthesizing medical insights...</p>
    </div>

    <div id="result-section">
        <div class="result-card">
            <div class="prediction-header">
                <h3>Detected Condition</h3>
                <span class="prediction-badge" id="pred-class"></span>
            </div>
            <div class="advice-content">
                <div class="advice-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                    AI Dermatologist Report
                </div>
                <div class="advice-box" id="llm-advice"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name');
    const analyzeBtn = document.getElementById('analyze-btn');
    const dropZone = document.getElementById('drop-zone');
    const imagePreview = document.getElementById('image-preview');

    // Drag and drop functionality
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if(files.length) {
            fileInput.files = files;
            handleFileSelect(files[0]);
        }
    });

    fileInput.addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
            handleFileSelect(e.target.files[0]);
        }
    });

    function handleFileSelect(file) {
        fileNameDisplay.textContent = file.name;
        analyzeBtn.disabled = false;
        
        // Hide upload text/icon and show preview
        const reader = new FileReader();
        reader.onload = function(e) {
            imagePreview.src = e.target.result;
            imagePreview.style.display = 'block';
            dropZone.style.display = 'none';
        }
        reader.readAsDataURL(file);
    }

    async function analyzeImage() {
        if(fileInput.files.length === 0) return;
        
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        document.getElementById('loader').style.display = 'block';
        document.getElementById('result-section').style.display = 'none';
        analyzeBtn.disabled = true;

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if (!response.ok) throw new Error(data.error || 'Server error');
            
            document.getElementById('pred-class').textContent = data.prediction;
            
            // Basic formatting for LLM response
            const formattedAdvice = data.advice.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
            document.getElementById('llm-advice').innerHTML = `<p>${formattedAdvice}</p>`;
            
            document.getElementById('result-section').style.display = 'block';
            
            // Scroll to results slightly
            setTimeout(() => {
                document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
            
        } catch (error) {
            alert('Error connecting to the API: ' + error.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
            analyzeBtn.disabled = false;
        }
    }
</script>

</body>
</html>
